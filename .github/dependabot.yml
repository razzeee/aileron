version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "rust"

  - package-ecosystem: "docker"
    directory: "/runtimes/llm-vision-whisper"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "container-images"

  - package-ecosystem: "docker"
    directory: "/runtimes/stub"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "container-images"

  - package-ecosystem: "docker"
    directory: "/runtimes/tts-vits"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "container-images"
