name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Core crates (no GTK) ────────────────────────────────────────────────────
  # Runs on a plain ubuntu runner; builds and tests everything except the two
  # GTK binaries.  This is the fast path that catches most regressions.
  core:
    name: Core — check / test / clippy / fmt
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: core-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: core-${{ runner.os }}-

      - name: Install system deps (dbus only)
        run: sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check (core crates only)
        run: >
          cargo check
          -p aileron-varlink
          -p aileron-ipc
          -p aileron-daemon
          -p aileron-portal

      - name: cargo test (core crates only)
        run: >
          cargo test
          -p aileron-varlink
          -p aileron-ipc
          -p aileron-daemon
          -p aileron-portal

      - name: cargo clippy (core crates only)
        run: >
          cargo clippy
          -p aileron-varlink
          -p aileron-ipc
          -p aileron-daemon
          -p aileron-portal
          -- -D warnings

  # ── GTK crates ──────────────────────────────────────────────────────────────
  # Runs inside Fedora because Ubuntu 24.04 only ships libadwaita 1.5, while the
  # UI uses newer libadwaita APIs. Tests are skipped because they need a display.
  gtk:
    name: GTK — check / clippy
    runs-on: ubuntu-24.04
    container: fedora:latest

    steps:
      - name: Install Fedora build deps
        run: |
          dnf install -y \
            ca-certificates \
            curl \
            dbus-devel \
            gcc \
            git \
            gtk4-devel \
            libadwaita-devel \
            openssl-devel \
            pkgconf-pkg-config \
            tar \
            xz

      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: gtk-fedora-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: gtk-fedora-${{ runner.os }}-

      - name: cargo check (all crates)
        run: cargo check --workspace

      - name: cargo clippy (GTK crates)
        run: >
          cargo clippy
          -p aileron
          -p aileron-demo
          -- -D warnings

      - name: cargo test (display-independent demo tests)
        run: cargo test -p aileron-demo

  # ── Stub container image ────────────────────────────────────────────────────
  # Verifies the stub Dockerfile builds successfully, then smoke-tests the
  # daemon container wrapper and the protocol by piping requests directly to it.
  stub-image:
    name: Stub container — build + protocol smoke test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install container runtime deps
        run: sudo apt-get install -y --no-install-recommends podman crun

      - name: Cache cargo registry + build
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: stub-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: stub-${{ runner.os }}-

      - name: Build stub image
        run: podman build -f runtimes/stub/Dockerfile -t aileron/stub:ci .

      - name: Export stub rootfs for daemon wrapper
        env:
          AILERON_OCI_STORE: ${{ runner.temp }}/aileron-oci
        run: |
          mkdir -p "$AILERON_OCI_STORE/rootfs/aileron_stub_ci"
          stub_container=$(podman create aileron/stub:ci)
          podman export "$stub_container" |
            tar -C "$AILERON_OCI_STORE/rootfs/aileron_stub_ci" -xf -
          podman rm "$stub_container"

      - name: Container wrapper roundtrip — all stub capabilities
        env:
          AILERON_STUB_IMAGE: aileron/stub:ci
          AILERON_OCI_STORE: ${{ runner.temp }}/aileron-oci
        run: >
          cargo test
          -p aileron-daemon
          stub_runtime_roundtrip_through_container_wrapper
          -- --ignored

      - name: Protocol smoke test — generate
        run: |
          REQUEST='{"id":"test-1","type":"generate","prompt":"hello world","max_tokens":16}'
          OUTPUT=$(echo "$REQUEST" | podman run --rm -i aileron/stub:ci)
          echo "Output: $OUTPUT"
          # Must contain at least one token line and a done:true line.
          echo "$OUTPUT" | grep -q '"token"'
          echo "$OUTPUT" | grep -Eq '"done"[[:space:]]*:[[:space:]]*true'

      - name: Protocol smoke test — generate_structured
        run: |
          SCHEMA='{"type":"object","properties":{"name":{"type":"string"}},"required":["name"]}'
          REQUEST=$(printf '{"id":"test-2","type":"generate_structured","prompt":"extract","max_tokens":64,"response_format":{"type":"json_schema","schema":%s}}' "$SCHEMA")
          OUTPUT=$(echo "$REQUEST" | podman run --rm -i aileron/stub:ci)
          echo "Output: $OUTPUT"
          echo "$OUTPUT" | grep -q '"result"'
          echo "$OUTPUT" | grep -Eq '"done"[[:space:]]*:[[:space:]]*true'
          # result must contain the required field in the returned JSON string.
          echo "$OUTPUT" | grep -q '\\"name\\"'

      - name: Protocol smoke test — transcribe
        run: |
          # Empty base64 audio is fine for the stub; it ignores the bytes.
          REQUEST='{"id":"test-3","type":"transcribe","audio":""}'
          OUTPUT=$(echo "$REQUEST" | podman run --rm -i aileron/stub:ci)
          echo "Output: $OUTPUT"
          echo "$OUTPUT" | grep -Eq '"done"[[:space:]]*:[[:space:]]*true'

      - name: Protocol smoke test — synthesize
        run: |
          REQUEST='{"id":"test-4","type":"synthesize","text":"Hello from CI.","voice_id":"","language_hint":"en","execution_mode":"interactive"}'
          OUTPUT=$(echo "$REQUEST" | podman run --rm -i aileron/stub:ci)
          echo "Output: $OUTPUT"
          OUTPUT="$OUTPUT" python3 - <<'PY'
          import base64
          import json
          import os

          events = [json.loads(line) for line in os.environ["OUTPUT"].splitlines()]
          chunks = [event for event in events if event.get("audio")]
          assert len(chunks) >= 2
          assert events[-1].get("done") is True
          metadata = (
              chunks[0]["sample_rate"],
              chunks[0]["channels"],
              chunks[0]["sample_format"],
          )
          assert metadata == (24000, 1, "s16le")
          for event in chunks:
              pcm = base64.b64decode(event["audio"], validate=True)
              assert pcm and len(pcm) % (metadata[1] * 2) == 0
          PY
