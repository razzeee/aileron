name: Runtime Images

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/runtime-images.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "runtimes/llm-vision-whisper/**"
      - "runtimes/stub/**"
      - "crates/aileron-runtime/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ml-runtime:
    name: llm-vision-whisper ${{ matrix.variant }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            build_args: |
              RUNTIME_ID=llm-vision-whisper
              RUNTIME_VARIANT=cpu
              RUNTIME_DESCRIPTION=Aileron combined LLM, vision, and Whisper runtime.
          - variant: cuda
            build_args: |
              BUILDER_IMAGE=nvidia/cuda:13.3.0-devel-ubuntu24.04
              FINAL_IMAGE=nvidia/cuda:13.3.0-runtime-ubuntu24.04
              RUNTIME_APT_PACKAGES=libgomp1 libstdc++6 libgcc-s1 ca-certificates
              APT_PACKAGES=build-essential cmake git ninja-build
              CMAKE_ARGS=-DGGML_CUDA=on
              CUDA_DOCKER_ARCH=all
              LDFLAGS=-L/usr/local/cuda/lib64/stubs -Wl,-rpath-link,/usr/local/cuda/lib64/stubs
              RUNTIME_ID=llm-vision-whisper
              RUNTIME_VARIANT=cuda
              RUNTIME_DESCRIPTION=Aileron combined LLM, vision, and Whisper runtime.
          - variant: rocm
            build_args: |
              BUILDER_IMAGE=rocm/dev-ubuntu-22.04:7.2.4
              FINAL_IMAGE=rocm/dev-ubuntu-22.04:7.2.4
              RUNTIME_APT_PACKAGES=libgomp1 libstdc++6 libgcc-s1 ca-certificates hipblas-dev rocblas-dev
              APT_PACKAGES=build-essential cmake git ninja-build hipblas-dev rocblas-dev
              CMAKE_ARGS=-DGGML_HIP=on -DAMDGPU_TARGETS=gfx900;gfx906;gfx908;gfx90a;gfx942;gfx950;gfx1010;gfx1011;gfx1012;gfx1030;gfx1031;gfx1032;gfx1035;gfx1036;gfx1100;gfx1101;gfx1102;gfx1103;gfx1150;gfx1151;gfx1152;gfx1153;gfx1200;gfx1201
              FORCE_CMAKE=1
              RUNTIME_ID=llm-vision-whisper
              RUNTIME_VARIANT=rocm
              RUNTIME_DESCRIPTION=Aileron combined LLM, vision, and Whisper runtime.
          - variant: vulkan
            build_args: |
              FINAL_IMAGE=fedora:latest
              APT_PACKAGES=build-essential cmake git ninja-build libvulkan-dev glslc glslang-tools spirv-headers
              RUNTIME_APT_PACKAGES=libgomp libstdc++ libgcc ca-certificates vulkan-loader mesa-vulkan-drivers
              CMAKE_ARGS=-DGGML_VULKAN=on
              RUNTIME_ID=llm-vision-whisper
              RUNTIME_VARIANT=vulkan
              RUNTIME_DESCRIPTION=Aileron combined LLM, vision, and Whisper runtime.

    steps:
      - uses: actions/checkout@v7

      - name: Compute image namespace
        run: echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: runtimes/llm-vision-whisper/Dockerfile
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/aileron-runtime-llm-vision-whisper:${{ matrix.variant }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/aileron-runtime-llm-vision-whisper:${{ github.sha }}-${{ matrix.variant }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=aileron-runtime-llm-vision-whisper
            org.opencontainers.image.version=${{ matrix.variant }}
            org.opencontainers.image.description=Aileron combined LLM, vision, and Whisper runtime.
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/runtimes/llm-vision-whisper/README.md
          annotations: |
            index,manifest:org.opencontainers.image.description=Aileron combined LLM, vision, and Whisper runtime.
            index,manifest:org.opencontainers.image.licenses=GPL-3.0-or-later
            index,manifest:org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/runtimes/llm-vision-whisper/README.md
          cache-from: type=gha,scope=aileron-runtime-llm-vision-whisper-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=aileron-runtime-llm-vision-whisper-${{ matrix.variant }}

  stub:
    name: stub cpu
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Compute image namespace
        run: echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: runtimes/stub/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/aileron-runtime-stub:cpu
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/aileron-runtime-stub:${{ github.sha }}-cpu
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=aileron-runtime-stub
            org.opencontainers.image.version=cpu
            org.opencontainers.image.description=Aileron stub runtime for development and protocol testing.
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/runtimes/stub/README.md
          annotations: |
            index,manifest:org.opencontainers.image.description=Aileron stub runtime for development and protocol testing.
            index,manifest:org.opencontainers.image.licenses=GPL-3.0-or-later
            index,manifest:org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/runtimes/stub/README.md
          cache-from: type=gha,scope=aileron-runtime-stub-cpu
          cache-to: type=gha,mode=max,scope=aileron-runtime-stub-cpu
