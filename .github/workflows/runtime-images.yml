name: Runtime Images

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/runtime-images.yml"
      - "runtimes/_llama_cpp_common/**"
      - "runtimes/llama-cpp.Dockerfile"
      - "runtimes/llm-llama-cpp/**"
      - "runtimes/vision-llama-cpp-gemma4/**"
      - "runtimes/asr-whisper-cpp/**"
      - "runtimes/stub/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  llama-cpp:
    name: ${{ matrix.runtime_id }} ${{ matrix.variant }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime_id: llm-llama-cpp
            image_name: aileron-runtime-llm-llama-cpp
            description: Aileron llama.cpp runtime for local text generation.
            documentation_path: runtimes/llm-llama-cpp/README.md
            variant: cpu
            build_args: |
              RUNTIME_ID=llm-llama-cpp
              RUNTIME_VARIANT=cpu
              RUNTIME_DESCRIPTION=Aileron llama.cpp runtime for local text generation.
              ENTRYPOINT_PATH=runtimes/llm-llama-cpp/entrypoint.py
              EXTRA_PIP_PACKAGES=jsonschema
          - runtime_id: llm-llama-cpp
            image_name: aileron-runtime-llm-llama-cpp
            description: Aileron llama.cpp runtime for local text generation.
            documentation_path: runtimes/llm-llama-cpp/README.md
            variant: cuda
            build_args: |
              BASE_IMAGE=nvidia/cuda:13.3.0-devel-ubuntu24.04
              APT_PACKAGES=python3 python3-pip python3-dev build-essential cmake git ninja-build
              CMAKE_ARGS=-DGGML_CUDA=on
              CUDA_DOCKER_ARCH=all
              LDFLAGS=-L/usr/local/cuda/lib64/stubs -Wl,-rpath-link,/usr/local/cuda/lib64/stubs
              RUNTIME_ID=llm-llama-cpp
              RUNTIME_VARIANT=cuda
              RUNTIME_DESCRIPTION=Aileron llama.cpp runtime for local text generation.
              ENTRYPOINT_PATH=runtimes/llm-llama-cpp/entrypoint.py
              EXTRA_PIP_PACKAGES=jsonschema
          - runtime_id: llm-llama-cpp
            image_name: aileron-runtime-llm-llama-cpp
            description: Aileron llama.cpp runtime for local text generation.
            documentation_path: runtimes/llm-llama-cpp/README.md
            variant: rocm
            build_args: |
              BASE_IMAGE=rocm/dev-ubuntu-22.04:7.2.4
              APT_PACKAGES=python3 python3-pip python3-dev build-essential cmake git ninja-build hipblas-dev rocblas-dev
              CMAKE_ARGS=-DGGML_HIP=on -DAMDGPU_TARGETS=gfx1030
              FORCE_CMAKE=1
              HSA_OVERRIDE_GFX_VERSION=10.3.0
              PIP_INSTALL_ARGS=--no-binary llama-cpp-python
              RUNTIME_ID=llm-llama-cpp
              RUNTIME_VARIANT=rocm
              RUNTIME_DESCRIPTION=Aileron llama.cpp runtime for local text generation.
              ENTRYPOINT_PATH=runtimes/llm-llama-cpp/entrypoint.py
              EXTRA_PIP_PACKAGES=jsonschema
          - runtime_id: llm-llama-cpp
            image_name: aileron-runtime-llm-llama-cpp
            description: Aileron llama.cpp runtime for local text generation.
            documentation_path: runtimes/llm-llama-cpp/README.md
            variant: vulkan
            build_args: |
              APT_PACKAGES=build-essential cmake git ninja-build libvulkan-dev glslc glslang-tools spirv-headers vulkan-tools libvulkan1 mesa-vulkan-drivers
              CMAKE_ARGS=-DGGML_VULKAN=on
              RUNTIME_ID=llm-llama-cpp
              RUNTIME_VARIANT=vulkan
              RUNTIME_DESCRIPTION=Aileron llama.cpp runtime for local text generation.
              ENTRYPOINT_PATH=runtimes/llm-llama-cpp/entrypoint.py
              EXTRA_PIP_PACKAGES=jsonschema
          - runtime_id: vision-llama-cpp-gemma4
            image_name: aileron-runtime-vision-llama-cpp-gemma4
            description: Aileron Gemma 4 vision runtime using llama.cpp.
            documentation_path: runtimes/vision-llama-cpp-gemma4/README.md
            variant: cpu
            build_args: |
              RUNTIME_ID=vision-llama-cpp-gemma4
              RUNTIME_VARIANT=cpu
              RUNTIME_DESCRIPTION=Aileron Gemma 4 vision runtime using llama.cpp.
              ENTRYPOINT_PATH=runtimes/vision-llama-cpp-gemma4/entrypoint.py
              INSTALL_SOURCE=git
          - runtime_id: vision-llama-cpp-gemma4
            image_name: aileron-runtime-vision-llama-cpp-gemma4
            description: Aileron Gemma 4 vision runtime using llama.cpp.
            documentation_path: runtimes/vision-llama-cpp-gemma4/README.md
            variant: cuda
            build_args: |
              BASE_IMAGE=nvidia/cuda:13.3.0-devel-ubuntu24.04
              APT_PACKAGES=python3 python3-pip python3-dev build-essential cmake git ninja-build
              CMAKE_ARGS=-DGGML_CUDA=on
              CUDA_DOCKER_ARCH=all
              LDFLAGS=-L/usr/local/cuda/lib64/stubs -Wl,-rpath-link,/usr/local/cuda/lib64/stubs
              RUNTIME_ID=vision-llama-cpp-gemma4
              RUNTIME_VARIANT=cuda
              RUNTIME_DESCRIPTION=Aileron Gemma 4 vision runtime using llama.cpp.
              ENTRYPOINT_PATH=runtimes/vision-llama-cpp-gemma4/entrypoint.py
              INSTALL_SOURCE=git
          - runtime_id: vision-llama-cpp-gemma4
            image_name: aileron-runtime-vision-llama-cpp-gemma4
            description: Aileron Gemma 4 vision runtime using llama.cpp.
            documentation_path: runtimes/vision-llama-cpp-gemma4/README.md
            variant: rocm
            build_args: |
              BASE_IMAGE=rocm/dev-ubuntu-22.04:7.2.4
              APT_PACKAGES=python3 python3-pip python3-dev build-essential cmake git ninja-build hipblas-dev rocblas-dev
              CMAKE_ARGS=-DGGML_HIP=on -DAMDGPU_TARGETS=gfx1030
              FORCE_CMAKE=1
              HSA_OVERRIDE_GFX_VERSION=10.3.0
              PIP_INSTALL_ARGS=--no-binary llama-cpp-python
              RUNTIME_ID=vision-llama-cpp-gemma4
              RUNTIME_VARIANT=rocm
              RUNTIME_DESCRIPTION=Aileron Gemma 4 vision runtime using llama.cpp.
              ENTRYPOINT_PATH=runtimes/vision-llama-cpp-gemma4/entrypoint.py
              INSTALL_SOURCE=git
          - runtime_id: vision-llama-cpp-gemma4
            image_name: aileron-runtime-vision-llama-cpp-gemma4
            description: Aileron Gemma 4 vision runtime using llama.cpp.
            documentation_path: runtimes/vision-llama-cpp-gemma4/README.md
            variant: vulkan
            build_args: |
              APT_PACKAGES=build-essential cmake git ninja-build libvulkan-dev glslc glslang-tools spirv-headers vulkan-tools libvulkan1 mesa-vulkan-drivers
              CMAKE_ARGS=-DGGML_VULKAN=on
              RUNTIME_ID=vision-llama-cpp-gemma4
              RUNTIME_VARIANT=vulkan
              RUNTIME_DESCRIPTION=Aileron Gemma 4 vision runtime using llama.cpp.
              ENTRYPOINT_PATH=runtimes/vision-llama-cpp-gemma4/entrypoint.py
              INSTALL_SOURCE=git

    steps:
      - uses: actions/checkout@v4

      - name: Compute image namespace
        run: echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runtimes/llama-cpp.Dockerfile
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ matrix.variant }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ github.sha }}-${{ matrix.variant }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.version=${{ matrix.variant }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/${{ matrix.documentation_path }}
          annotations: |
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=GPL-3.0-or-later
          cache-from: type=gha,scope=${{ matrix.image_name }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}-${{ matrix.variant }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ github.sha }}-${{ matrix.variant }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: 1

  other-runtimes:
    name: ${{ matrix.runtime_id }} ${{ matrix.variant }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime_id: asr-whisper-cpp
            image_name: aileron-runtime-asr-whisper-cpp
            description: Aileron Whisper.cpp runtime for local speech transcription.
            documentation_path: runtimes/asr-whisper-cpp/README.md
            variant: cpu
            context: runtimes/asr-whisper-cpp
            file: runtimes/asr-whisper-cpp/Dockerfile
          - runtime_id: asr-whisper-cpp
            image_name: aileron-runtime-asr-whisper-cpp
            description: Aileron Whisper.cpp runtime for local speech transcription.
            documentation_path: runtimes/asr-whisper-cpp/README.md
            variant: cuda
            context: runtimes/asr-whisper-cpp
            file: runtimes/asr-whisper-cpp/Dockerfile.cuda
          - runtime_id: asr-whisper-cpp
            image_name: aileron-runtime-asr-whisper-cpp
            description: Aileron Whisper.cpp runtime for local speech transcription.
            documentation_path: runtimes/asr-whisper-cpp/README.md
            variant: vulkan
            context: runtimes/asr-whisper-cpp
            file: runtimes/asr-whisper-cpp/Dockerfile.vulkan
          - runtime_id: stub
            image_name: aileron-runtime-stub
            description: Aileron stub runtime for development and protocol testing.
            documentation_path: runtimes/stub/README.md
            variant: cpu
            context: runtimes/stub
            file: runtimes/stub/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Compute image namespace
        run: echo "IMAGE_NAMESPACE=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ matrix.variant }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ github.sha }}-${{ matrix.variant }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.version=${{ matrix.variant }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=GPL-3.0-or-later
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/${{ matrix.documentation_path }}
          annotations: |
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=GPL-3.0-or-later
          cache-from: type=gha,scope=${{ matrix.image_name }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}-${{ matrix.variant }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ github.sha }}-${{ matrix.variant }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: 1
